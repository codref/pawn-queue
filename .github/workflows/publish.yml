name: Publish to PyPI

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      pypi_environment:
        description: 'PyPI environment (pypi or testpypi)'
        required: true
        default: 'pypi'
        type: choice
        options:
          - pypi
          - testpypi

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.pypi_environment || 'pypi' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify version matches tag (for releases)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          pip install tomlkit
          FILE_VERSION=$(python -c "import tomlkit; content = open('pyproject.toml').read(); data = tomlkit.parse(content); print(data['project']['version'])")
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: pyproject.toml version ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $FILE_VERSION"

      - name: Build distribution
        run: python -m build

      - name: Check package with twine
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ secrets.PYPI_REPOSITORY_URL || 'https://upload.pypi.org/legacy/' }}
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish to TestPyPI (if manual dispatch to testpypi)
        if: github.event.inputs.pypi_environment == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

      - name: Create GitHub Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
