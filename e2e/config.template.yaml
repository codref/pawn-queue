# E2E configuration template — commit this file, NOT e2e/config.yaml
#
# For local runs: copy this file to e2e/config.yaml and fill in your credentials.
# e2e/config.yaml is listed in .gitignore and will never be committed.
#
# Environment variables override every value below.
# Mapping:
#   PAWNQUEUE_S3_ENDPOINT_URL   → s3.endpoint_url
#   PAWNQUEUE_S3_BUCKET_NAME    → s3.bucket_name
#   PAWNQUEUE_S3_ACCESS_KEY     → s3.aws_access_key_id
#   PAWNQUEUE_S3_SECRET_KEY     → s3.aws_secret_access_key
#   PAWNQUEUE_S3_REGION         → s3.region_name

s3:
  endpoint_url: "https://fsn1.your-objectstorage.com"
  bucket_name: "your-existing-bucket"
  aws_access_key_id: "CHANGE_ME"
  aws_secret_access_key: "CHANGE_ME"
  region_name: "eu-central-1"
  use_ssl: true

polling:
  interval_seconds: 2
  max_messages_per_poll: 5
  visibility_timeout_seconds: 15
  lease_refresh_interval_seconds: 5
  jitter_max_ms: 100

concurrency:
  strategy: "auto"
  csprng_verify:
    jitter_min_ms: 100
    jitter_max_ms: 400
    verify_retries: 2
    verify_retry_delay_ms: 150

registry:
  heartbeat_interval_seconds: 30
